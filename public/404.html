<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PsiNote</title>
  <script type="text/javascript">
    var l = window.location;
    var path = l.pathname.replace(/^\/psinote/, '');
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/psinote/#' + path
    );
  </script>
</head>
<body>
  <p>Redirecionando...</p>
</body>
</html>
